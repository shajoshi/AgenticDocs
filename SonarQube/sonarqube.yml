name: SonarQube On-Demand Analysis

on:
  #push:
  #  branches: [main]
  workflow_dispatch:

jobs:
  sonar-scan:
    runs-on: ubuntu-latest
    # THIS BLOCK MUST BE HERE
    permissions:
      contents: read
      pull-requests: write
    outputs:
      vm_started: ${{ steps.check-vm.outputs.vm_started }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check VM Status and Start if Needed
        id: check-vm
        run: |
          VM_STATUS=$(az vm get-instance-view --resource-group Rivvun_Platform --name rivvundevops1 --query instanceView.statuses[1].code -o tsv)
          echo "Current VM status: $VM_STATUS"
          if [[ "$VM_STATUS" == "PowerState/running" ]]; then
            echo "VM is already running"
            echo "vm_started=false" >> $GITHUB_OUTPUT
          else
            echo "VM is not running, starting it..."
            az vm start --resource-group Rivvun_Platform --name rivvundevops1
            echo "vm_started=true" >> $GITHUB_OUTPUT
          fi

      - name: Wait for SonarQube to be Ready
        run: |
          echo "Waiting for SonarQube to start..."
          timeout 300s bash -c '
          until curl -s -u ${{ secrets.SONAR_TOKEN }}: "${{ vars.SONAR_HOST_URL }}/api/system/status" | grep -q "UP"; do
            echo "SonarQube is starting..."
            sleep 10
          done'
          echo "SonarQube is UP and running!"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        # This forces the scanner to ignore the PR/CI metadata check
        with:
          args: >
            -Dsonar.scm.disabled=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: Wait for Analysis Completion
        run: |
          echo "Extracting Project Key..."
          # This command finds the projectKey line, splits by '=', and trims whitespace
          # PROJECT_KEY=$(grep 'sonar.projectKey' sonar-project.properties | cut -d'=' -f2 | xargs)
          PROJECT_KEY=$(grep 'sonar.projectKey' sonar-project.properties | cut -d'=' -f2 | tr -d '\r\n ')
          echo "Project Key identified as: $PROJECT_KEY"

          sleep 10
          SONAR_TOKEN="${{ secrets.SONAR_TOKEN }}"
          SONAR_HOST_URL="${{ vars.SONAR_HOST_URL }}"
          START_TIME=$(date +%s)
          TIMEOUT=600

          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "Timeout waiting for analysis after ${TIMEOUT}s"
              exit 1
            fi

            # Using the dynamic $PROJECT_KEY variable here
            RESPONSE=$(curl -s -w "\n%{http_code}" -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/ce/component?component=$PROJECT_KEY")
            
            HTTP_CODE=$(printf '%s' "$RESPONSE" | tail -n1)
            BODY=$(printf '%s' "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" != "200" ]; then
              echo "API returned HTTP $HTTP_CODE, retrying..."
              sleep 15
              continue
            fi

            STATUS=$(printf '%s' "$BODY" | jq -r '.current.status // "PENDING"')
            echo "Analysis status: $STATUS (elapsed: ${ELAPSED}s)"

            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Analysis completed successfully!"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "Analysis failed or was canceled"
              exit 1
            fi
            sleep 15
          done
     
      - name: Shutdown VM (if started by this workflow)
        if: steps.check-vm.outputs.vm_started == 'true'
        run: |
          echo "Shutting down VM as it was started by this workflow..."
          az vm deallocate --resource-group Rivvun_Platform --name rivvundevops1